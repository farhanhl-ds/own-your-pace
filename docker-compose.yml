services:

  # ─── Database ───────────────────────────────────────────────
  db:
    image: timescale/timescaledb-ha:pg18
    container_name: oyp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oyp}
      POSTGRES_USER: ${POSTGRES_USER:-oyp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/home/postgres/pgdata/data
      - ./backend/app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oyp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oyp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI backend ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oyp_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-oyp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-oyp}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Celery worker (background jobs) ────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oyp_worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info -Q default,gpx,sync
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-oyp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-oyp}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── n8n orchestrator ────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: oyp_n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://${N8N_HOST:-localhost}:5678/
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      GENERIC_TIMEZONE: ${TIMEZONE:-Asia/Jakarta}
      # API key used by n8n to authenticate against FastAPI
      OYP_API_URL: http://api:8000
      OYP_API_KEY: ${INTERNAL_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      api:
        condition: service_healthy

  # ─── React frontend (dev) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: oyp_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"

  # ─── Nginx reverse proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: oyp_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend

volumes:
  db_data:
  redis_data:
  n8n_data:
  uploads_data:
